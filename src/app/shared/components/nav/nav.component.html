      </button>
      @if (langOpen) {
        <ul class="nav__lang-dropdown" role="listbox">
          @for (option of langs; track option) {
            <li
              class="nav__lang-option"
              [class.nav__lang-option--active]="lang === option"
              (click)="selectLang(option)"
              role="option"
              [attr.aria-selected]="lang === option">
              {{ option }}
            </li>
          }
        </ul>
      }
