<section class="hero" id="hero">
  <img
    class="hero_deco"
    src="assets/bg-wallpapers/monstera-flowers.png"
    aria-hidden="true"
  />
  <div class="hero_left">
    <p class="hero_greeting">
      {{ t().hero.greeting }}
      <span class="hero_pronunciation">{{ pronunciation }}</span
      >,
    </p>
    <h1 class="hero_title">{{ t().hero.title }}</h1>
    <p class="hero_location">{{ t().hero.location }}</p>
    <div class="hero_badges">
      <la-badge [label]="t().hero.badgeWork" [link]="projectsLink()" />
      <la-badge [label]="t().hero.badgeJewellery" [link]="jewelleryLink()" />
    </div>
  </div>

  <div class="hero_right">
    <div class="hero_photo-wrapper">
      <img class="hero_photo" [src]="photo" [alt]="name" />
    </div>
  </div>
</section>
