<div class="jewellery">
  <div class="jewellery_header">
    <a class="jewellery_back" routerLink="/">← Back</a>
    <h1 class="jewellery_title">Jewellery</h1>
    <p class="jewellery_subtitle">Handmade pieces, crafted from scratch.</p>
  </div>

  <div class="jewellery_grid">
    @for (img of images; track img.url; let i = $index) {
      <div class="jewellery_item" (click)="open(i)">
        <img [src]="img.url" [alt]="img.alt" loading="lazy" />
      </div>
    }
  </div>

  <button class="jewellery_top" (click)="scrollToTop()">↑ Back to top</button>
</div>

@if (activeImage) {
  <div class="lightbox" (click)="close()">
    <button class="lightbox_close" (click)="close()">✕</button>
    <button class="lightbox_arrow lightbox_arrow--prev" (click)="$event.stopPropagation(); prev()">‹</button>
    <img class="lightbox_img" [src]="activeImage.url" [alt]="activeImage.alt" (click)="$event.stopPropagation()" />
    <button class="lightbox_arrow lightbox_arrow--next" (click)="$event.stopPropagation(); next()">›</button>
  </div>
}
