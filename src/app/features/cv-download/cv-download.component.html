<section class="cv" id="cv">
  <p class="cv_label">Download my CV</p>
  <div class="cv_buttons">
    @for (entry of cvEntries; track entry.label) {
      <a class="cv_btn" [href]="entry.url" target="_blank" rel="noopener">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        {{ entry.label }}
      </a>
    }
  </div>
</section>
